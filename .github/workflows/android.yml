name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk
  NODE_OPTIONS: --max_old_space_size=4096
  EXPO_NO_DOCTOR: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 Node.js（移除 npm 缓存，避免锁文件检查）
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        # 关键修复：删除 cache: 'npm'，避免检查锁文件
        cache-dependency-path: ''

    # 2. 初始化 npm 并安装依赖（适配无 lock 文件的场景）
    - name: Install npm dependencies (generate lock file if missing)
      run: |
        # 初始化 npm（如果项目没有 package.json 也能兜底）
        if [ ! -f package.json ]; then
          npm init -y
          npm install expo react react-native
        fi
        
        # 安装依赖并生成 package-lock.json（解决锁文件缺失）
        npm install --package-lock-only
        npm install
        
        # 验证依赖安装
        npm list

    # 3. 安装 Expo CLI（Expo 项目必须）
    - name: Install Expo CLI
      run: npm install -g expo-cli

    # 4. 生成/修复 Expo 原生配置
    - name: Generate Expo Android native code
      run: |
        npx expo prebuild --platform android --clean
        # 确认 android 目录生成成功
        ls -la android/

    # 5. 安装系统级 Gradle 7.5
    - name: Install Gradle 7.5 globally
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -P /tmp
        unzip -q /tmp/gradle-7.5-bin.zip -d /opt
        ln -s /opt/gradle-7.5/bin/gradle /usr/local/bin/gradle
        gradle --version

    # 6. 安装 JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 7. 修复 Android 构建配置
    - name: Fix Android build configuration
      run: |
        cd android
        gradle clean --refresh-dependencies
        sed -i 's/implementation /api /g' build.gradle app/build.gradle

    # 8. 构建 Debug APK
    - name: Build Android Debug APK
      run: gradle assembleDebug --stacktrace --info --no-parallel
      working-directory: ./android
      env:
        ORG_GRADLE_PROJECT_compositeBuild: false

    # 9. 上传产物
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
