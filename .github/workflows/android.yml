name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk
  # 关键：添加 Expo/React Native 所需环境变量
  NODE_OPTIONS: --max_old_space_size=4096
  EXPO_NO_DOCTOR: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 Node.js（Expo/React Native 必须先装 Node 解析依赖）
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # 2. 安装项目依赖（Expo/React Native 插件依赖 npm 包）
    - name: Install npm dependencies
      run: |
        npm install
        # 生成/修复 Expo 原生配置（关键：补全 Android 插件依赖）
        npx expo prebuild --platform android --clean

    # 3. 安装系统级 Gradle 7.5
    - name: Install Gradle 7.5 globally
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -P /tmp
        unzip -q /tmp/gradle-7.5-bin.zip -d /opt
        ln -s /opt/gradle-7.5/bin/gradle /usr/local/bin/gradle
        gradle --version

    # 4. 安装 JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 5. 修复 Android 构建配置（解决插件解析失败）
    - name: Fix Android build configuration
      run: |
        cd android
        # 强制刷新 Gradle 依赖缓存
        gradle clean --refresh-dependencies
        # 修复 settings.gradle 插件解析（Expo 专属）
        sed -i 's/implementation /api /g' build.gradle app/build.gradle

    # 6. 构建 Debug APK（关闭并行构建，减少插件冲突）
    - name: Build Android Debug APK
      run: gradle assembleDebug --stacktrace --info --no-parallel
      working-directory: ./android
      env:
        # 禁用 Gradle 复合构建，解决插件解析问题
        ORG_GRADLE_PROJECT_compositeBuild: false

    # 7. 上传产物
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
