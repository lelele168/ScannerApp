name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 核心修复：彻底解决 gradlew 无法执行的问题
    - name: Fix gradlew execution permissions and format
      run: |
        cd android
        
        # 1. 强制重置文件权限（777 确保最高执行权限）
        chmod 777 gradlew
        
        # 2. 修复 Windows 换行符（CRLF → LF）导致的执行失败
        # Linux 无法识别 Windows 换行符，会报 "required file not found"
        sed -i 's/\r$//' gradlew
        
        # 3. 验证脚本格式和权限
        echo "=== 验证 gradlew 信息 ==="
        ls -la gradlew  # 确认权限是 -rwxrwxrwx
        file gradlew   # 确认是 "POSIX shell script" 而非 "text file"
        
        # 4. 重建 Gradle Wrapper（兜底解决依赖缺失）
        bash gradlew wrapper --gradle-version 7.5 --distribution-type all

    - name: Build Android Debug APK
      run: bash gradlew assembleDebug --stacktrace --info
      working-directory: ./android
      continue-on-error: false

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
