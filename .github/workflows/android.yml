name: Android Release Build
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk
  NODE_OPTIONS: --max_old_space_size=8192
  EXPO_NO_DOCTOR: true
  CI: 1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 Node.js 18.x（Expo 兼容版本）
    - name: Set up Node.js 18.x (Expo compatible)
      uses: actions/setup-node@v4
      with:
        node-version: 18.20.4
        cache-dependency-path: ''

    # 2. 重建极简 Expo 49 项目（无 Reanimated 依赖）
    - name: Rebuild minimal Expo 49 project (no Reanimated)
      run: |
        # 1. 极简 package.json（仅核心依赖，无 Reanimated）
        rm -f package.json package-lock.json
        printf '{"name":"scannerapp","version":"1.0.0","private":true,"dependencies":{"expo":"^49.0.23","react":"18.2.0","react-native":"0.72.6"},"scripts":{"start":"expo start","android":"expo run:android","prebuild":"expo prebuild"},"devDependencies":{"@react-native/metro-config":"^0.72.11","metro-react-native-babel-preset":"^0.76.8"}}' > package.json
        
        # 2. 核心入口文件（纯基础组件，无动画依赖）
        printf 'import React from "react";\nimport { View, Text, StyleSheet } from "react-native";\n\nconst App = () => {\n  return (\n    <View style={styles.container}>\n      <Text style={styles.text}>ScannerApp Release Build</Text>\n      <Text style={styles.subtext}>No Reanimated dependencies</Text>\n    </View>\n  );\n};\n\nconst styles = StyleSheet.create({\n  container: { flex: 1, justifyContent: "center", alignItems: "center", backgroundColor: "#fff" },\n  text: { fontSize: 18, color: "#333", marginBottom: 10 },\n  subtext: { fontSize: 14, color: "#666" }\n});\n\nexport default App;' > App.js
        printf 'import { registerRootComponent } from "expo";\nimport App from "./App";\nregisterRootComponent(App);' > index.js
        
        # 3. 适配 React Native 0.72 的 Metro 配置（核心修复）
        printf 'const { getDefaultConfig } = require("@react-native/metro-config");\nconst config = getDefaultConfig(__dirname);\nmodule.exports = config;' > metro.config.js
        
        # 4. Babel 配置（禁用 Reanimated 插件）
        printf '{\n  "presets": ["module:metro-react-native-babel-preset"],\n  "plugins": []\n}' > babel.config.js
        
        # 5. 安装依赖（无 Reanimated，避免插件缺失）
        npm install --no-audit --no-fund --force

    # 3. 全局安装 Expo CLI 6.0.8
    - name: Install Expo CLI 6.0.8 globally
      run: |
        sudo npm install -g expo-cli@6.0.8
        expo --version

    # 4. 生成 Expo 49 配置 + 预构建
    - name: Generate app.json + prebuild
      run: |
        rm -f app.json
        printf '{"expo":{"name":"ScannerApp","slug":"ScannerApp","version":"1.0.0","platforms":["android"],"android":{"package":"com.scannerapp","compileSdkVersion":33,"targetSdkVersion":33,"minSdkVersion":24}}}' > app.json
        expo prebuild --platform android --clean --non-interactive

    # 5. 安装 Gradle 7.5
    - name: Install Gradle 7.5 with sudo
      run: |
        sudo wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -P /tmp
        sudo unzip -q /tmp/gradle-7.5-bin.zip -d /opt
        sudo ln -s /opt/gradle-7.5/bin/gradle /usr/local/bin/gradle
        gradle --version

    # 6. 安装 JDK 11
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # 7. 配置 Release 构建
    - name: Configure Release build
      run: |
        cd android/app
        # 生成签名配置
        echo "android {" > release-signing.gradle
        echo "    signingConfigs {" >> release-signing.gradle
        echo "        release {" >> release-signing.gradle
        echo "            storeFile file('debug.keystore')" >> release-signing.gradle
        echo "            storePassword 'android'" >> release-signing.gradle
        echo "            keyAlias 'androiddebugkey'" >> release-signing.gradle
        echo "            keyPassword 'android'" >> release-signing.gradle
        echo "            storeType 'jks'" >> release-signing.gradle
        echo "        }" >> release-signing.gradle
        echo "    }" >> release-signing.gradle
        echo "    buildTypes {" >> release-signing.gradle
        echo "        release {" >> release-signing.gradle
        echo "            signingConfig signingConfigs.release" >> release-signing.gradle
        echo "            minifyEnabled false" >> release-signing.gradle
        echo "            shrinkResources false" >> release-signing.gradle
        echo "        }" >> release-signing.gradle
        echo "    }" >> release-signing.gradle
        echo "}" >> release-signing.gradle
        
        # 导入配置
        echo '' >> build.gradle
        echo 'apply from: "release-signing.gradle"' >> build.gradle

    # 8. 预打包 JS + 编译 APK（跳过 Reanimated 检查）
    - name: Pre-build JS bundle + Build Release APK
      run: |
        # 手动打包JS（无 Reanimated 插件，打包成功）
        npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res/ --reset-cache
        # 编译APK
        cd android
        sudo gradle assembleRelease --no-parallel --no-daemon --console=plain -x bundleReleaseJsAndAssets
      env:
        ORG_GRADLE_PROJECT_compositeBuild: false
        ORG_GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx8g -Dfile.encoding=UTF-8"

    # 9. 修复权限 + 上传 APK
    - name: Fix APK permissions + Upload
      run: |
        sudo chmod 755 android/app/build/outputs/apk/release/*.apk
        mkdir -p ./release-apk
        cp android/app/build/outputs/apk/release/*.apk ./release-apk/
      if: success()

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: scannerapp-release-apk
        path: ./release-apk/*.apk
