name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk
  NODE_OPTIONS: --max_old_space_size=4096
  EXPO_NO_DOCTOR: true
  CI: 1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 Node.js
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache-dependency-path: ''

    # 2. 重建 package.json
    - name: Rebuild package.json
      run: |
        rm -f package.json package-lock.json
        printf '{"name":"scannerapp","version":"1.0.0","private":true,"dependencies":{"expo":"^50.0.17","react":"18.2.0","react-native":"0.73.6"},"scripts":{"prebuild":"expo prebuild","android":"expo run:android"}}' > package.json
        npm install --no-audit --no-fund --force

    # 3. 安装 Expo CLI
    - name: Install Expo CLI
      run: npm install -g expo-cli@6.3.10

    # 4. 生成 app.json + Expo 原生代码
    - name: Generate app.json and Expo code
      run: |
        rm -f app.json
        printf '{"expo":{"name":"ScannerApp","slug":"ScannerApp","version":"1.0.0","platforms":["android"],"android":{"package":"com.scannerapp","compileSdkVersion":33,"targetSdkVersion":33,"minSdkVersion":24}}}' > app.json
        npx expo prebuild --platform android --clean

    # 5. 安装 Gradle 7.6
    - name: Install Gradle 7.6 globally
      run: |
        wget https://services.gradle.org/distributions/gradle-7.6-bin.zip -P /tmp
        unzip -q /tmp/gradle-7.6-bin.zip -d /opt
        ln -s /opt/gradle-7.6/bin/gradle /usr/local/bin/gradle
        gradle --version

    # 6. 安装 JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 7. 修复 Android 构建配置（核心：禁用 Toolchain + 指定 Java 兼容性）
    - name: Fix Android build configuration (disable Toolchain)
      run: |
        cd android
        
        # 1. 修改根 build.gradle，禁用 Java Toolchain
        sed -i '/java.toolchain/d' build.gradle
        # 强制指定 Java 版本兼容性
        echo 'allprojects {' >> build.gradle
        echo '    repositories { mavenCentral() }' >> build.gradle
        echo '    tasks.withType(JavaCompile) {' >> build.gradle
        echo '        sourceCompatibility = JavaVersion.VERSION_17' >> build.gradle
        echo '        targetCompatibility = JavaVersion.VERSION_17' >> build.gradle
        echo '    }' >> build.gradle
        echo '}' >> build.gradle
        
        # 2. 修改 app/build.gradle，统一 Java 版本
        sed -i '/compileSdkVersion/c\compileSdkVersion = 33' app/build.gradle
        sed -i '/targetSdkVersion/c\targetSdkVersion = 33' app/build.gradle
        sed -i '/minSdkVersion/c\minSdkVersion = 24' app/build.gradle
        # 禁用 app 模块的 Toolchain
        sed -i '/java.toolchain/d' app/build.gradle
        # 强制指定 app 模块 Java 兼容性
        echo 'android {' >> app/build.gradle
        echo '    compileOptions {' >> app/build.gradle
        echo '        sourceCompatibility JavaVersion.VERSION_17' >> app/build.gradle
        echo '        targetCompatibility JavaVersion.VERSION_17' >> app/build.gradle
        echo '    }' >> app/build.gradle
        echo '    kotlinOptions {' >> app/build.gradle
        echo '        jvmTarget = "17"' >> app/build.gradle
        echo '    }' >> app/build.gradle
        echo '}' >> app/build.gradle

    # 8. 构建 Android Debug APK
    - name: Build Android Debug APK
      run: gradle assembleDebug --no-parallel --exclude-task validateSigningDebug
      working-directory: ./android
      env:
        ORG_GRADLE_PROJECT_compositeBuild: false
        # 强制禁用 Toolchain 特性
        ORG_GRADLE_JAVA_TOOLCHAIN_DISABLE: true

    # 9. 上传产物
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
