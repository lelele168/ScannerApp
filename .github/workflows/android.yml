name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk
  NODE_OPTIONS: --max_old_space_size=4096
  EXPO_NO_DOCTOR: true
  CI: 1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 Node.js
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache-dependency-path: ''

    # 2. 重建 package.json（降级到 Expo 49 稳定版）
    - name: Rebuild package.json (Expo 49)
      run: |
        rm -f package.json package-lock.json
        # Expo 49 + React Native 0.72.6（无 Toolchain 冲突）
        printf '{"name":"scannerapp","version":"1.0.0","private":true,"dependencies":{"expo":"^49.0.23","react":"18.2.0","react-native":"0.72.6"},"scripts":{"prebuild":"expo prebuild","android":"expo run:android"}}' > package.json
        npm install --no-audit --no-fund --force

    # 3. 安装 Expo CLI 49 配套版本
    - name: Install Expo CLI 6.0.8 (Expo 49 compatible)
      run: npm install -g expo-cli@6.0.8

    # 4. 生成 Expo 49 兼容的 app.json
    - name: Generate app.json (Expo 49)
      run: |
        rm -f app.json
        # Expo 49 精简配置，无高版本冲突项
        printf '{"expo":{"name":"ScannerApp","slug":"ScannerApp","version":"1.0.0","platforms":["android"],"android":{"package":"com.scannerapp","compileSdkVersion":33,"targetSdkVersion":33,"minSdkVersion":24}}}' > app.json
        npx expo prebuild --platform android --clean

    # 5. 安装 Gradle 7.5（Expo 49 官方推荐版本）
    - name: Install Gradle 7.5 globally
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -P /tmp
        unzip -q /tmp/gradle-7.5-bin.zip -d /opt
        ln -s /opt/gradle-7.5/bin/gradle /usr/local/bin/gradle
        gradle --version

    # 6. 安装 JDK 11（Expo 49 官方配套版本）
    - name: Set up JDK 11 (Expo 49 compatible)
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # 7. 简化构建（无 Toolchain 冲突）
    - name: Build Android Debug APK (Expo 49)
      run: gradle assembleDebug --no-parallel
      working-directory: ./android
      env:
        ORG_GRADLE_PROJECT_compositeBuild: false

    # 8. 上传产物
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
