name: Android Release Build
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk
  NODE_OPTIONS: --max_old_space_size=8192  # 加倍内存，避免打包OOM
  EXPO_NO_DOCTOR: true
  CI: 1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 Node.js + 核心依赖
    - name: Set up Node.js 20 + fix npm
      run: |
        npm install -g npm@10.2.3  # 稳定版npm，避免兼容性问题
        node -v
        npm -v

    # 2. 重建完整的 Expo 49 项目结构（核心：添加入口文件+Metro配置）
    - name: Rebuild complete Expo 49 project
      run: |
        # 1. 基础 package.json
        rm -f package.json package-lock.json
        printf '{"name":"scannerapp","version":"1.0.0","private":true,"dependencies":{"expo":"^49.0.23","react":"18.2.0","react-native":"0.72.6"},"scripts":{"start":"expo start","android":"expo run:android","prebuild":"expo prebuild"},"devDependencies":{"metro-config":"^0.76.8","metro-react-native-babel-preset":"^0.76.8"}}' > package.json
        
        # 2. 核心入口文件 App.js（必须存在，否则JS打包失败）
        printf 'import React from "react";\nimport { View, Text, StyleSheet } from "react-native";\n\nconst App = () => {\n  return (\n    <View style={styles.container}>\n      <Text style={styles.text}>ScannerApp Release Build</Text>\n    </View>\n  );\n};\n\nconst styles = StyleSheet.create({\n  container: { flex: 1, justifyContent: "center", alignItems: "center" },\n  text: { fontSize: 18, color: "#333" }\n});\n\nexport default App;' > App.js
        
        # 3. 入口文件 index.js（React Native 必需）
        printf 'import { registerRootComponent } from "expo";\nimport App from "./App";\nregisterRootComponent(App);' > index.js
        
        # 4. Metro 配置（修复打包路径问题）
        printf 'const { getDefaultConfig } = require("metro-config");\nmodule.exports = getDefaultConfig(__dirname);' > metro.config.js
        
        # 5. 安装依赖（强制刷新缓存）
        npm cache clean --force
        npm install --no-audit --no-fund --force

    # 3. 安装 Expo CLI 6.0.8
    - name: Install Expo CLI 6.0.8
      run: npm install -g expo-cli@6.0.8

    # 4. 生成 Expo 49 配置 + 预构建
    - name: Generate app.json + prebuild
      run: |
        rm -f app.json
        printf '{"expo":{"name":"ScannerApp","slug":"ScannerApp","version":"1.0.0","platforms":["android"],"android":{"package":"com.scannerapp","compileSdkVersion":33,"targetSdkVersion":33,"minSdkVersion":24},"entryPoint":"./index.js"}}' > app.json
        
        # 预构建前先启动Metro缓存（修复打包错误）
        npx expo prebuild --platform android --clean --non-interactive

    # 5. 安装 Gradle 7.5
    - name: Install Gradle 7.5 globally
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -P /tmp
        unzip -q /tmp/gradle-7.5-bin.zip -d /opt
        ln -s /opt/gradle-7.5/bin/gradle /usr/local/bin/gradle
        gradle --version

    # 6. 安装 JDK 11
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # 7. 配置 Release 构建（app目录，路径正确）
    - name: Configure Release build
      run: |
        cd android/app
        
        # 生成签名配置
        echo "android {" > release-signing.gradle
        echo "    signingConfigs {" >> release-signing.gradle
        echo "        release {" >> release-signing.gradle
        echo "            storeFile file('debug.keystore')" >> release-signing.gradle
        echo "            storePassword 'android'" >> release-signing.gradle
        echo "            keyAlias 'androiddebugkey'" >> release-signing.gradle
        echo "            keyPassword 'android'" >> release-signing.gradle
        echo "            storeType 'jks'" >> release-signing.gradle
        echo "        }" >> release-signing.gradle
        echo "    }" >> release-signing.gradle
        echo "    buildTypes {" >> release-signing.gradle
        echo "        release {" >> release-signing.gradle
        echo "            signingConfig signingConfigs.release" >> release-signing.gradle
        echo "            minifyEnabled false" >> release-signing.gradle
        echo "            shrinkResources false" >> release-signing.gradle
        echo "        }" >> release-signing.gradle
        echo "    }" >> release-signing.gradle
        echo "}" >> release-signing.gradle
        
        # 导入配置
        echo '' >> build.gradle
        echo 'apply from: "release-signing.gradle"' >> build.gradle

    # 8. 预打包 JS 代码 + 编译 Release APK（核心修复）
    - name: Pre-build JS bundle + Build Release APK
      run: |
        cd android
        # 第一步：手动打包JS代码（避免Gradle打包时出错）
        npx react-native bundle --platform android --dev false --entry-file ../index.js --bundle-output app/src/main/assets/index.android.bundle --assets-dest app/src/main/res/
        # 第二步：编译APK
        gradle assembleRelease --no-parallel --no-daemon --console=plain
      env:
        ORG_GRADLE_PROJECT_compositeBuild: false
        ORG_GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx8g -Dfile.encoding=UTF-8"

    # 9. 上传正式版 APK
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: scannerapp-release-apk
        path: android/app/build/outputs/apk/release/*.apk
