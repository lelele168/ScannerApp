name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 核心：重建 Gradle Wrapper（修复 YAML 语法 + jar 缺失问题）
    - name: Fully rebuild Gradle Wrapper (fix GradleWrapperMain error)
      run: |
        cd android
        
        # 1. 删除损坏的 wrapper 目录
        rm -rf gradle/wrapper
        
        # 2. 重新创建 wrapper 目录
        mkdir -p gradle/wrapper
        
        # 3. 下载官方 Gradle 7.5 Wrapper jar 包
        curl -o gradle/wrapper/gradle-wrapper.jar \
          https://services.gradle.org/distributions/gradle-7.5-wrapper.jar
        
        # 4. 生成 gradle-wrapper.properties（用 echo 逐行写入，避免 YAML 语法错误）
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
        echo "validateDistributionUrl=true" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        
        # 5. 修复 gradlew 权限和换行符
        chmod 777 gradlew
        sed -i 's/\r$//' gradlew
        
        # 6. 验证 wrapper 文件
        echo "=== Wrapper 文件列表 ==="
        ls -la gradle/wrapper/

    - name: Build Android Debug APK
      run: bash gradlew assembleDebug --stacktrace --info
      working-directory: ./android
      continue-on-error: false

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
