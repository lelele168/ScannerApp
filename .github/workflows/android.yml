name: Android Release Build
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk
  NODE_OPTIONS: --max_old_space_size=8192  # 内存配置保留
  EXPO_NO_DOCTOR: true
  CI: 1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 Node.js（移除全局 npm 升级，使用默认版本）
    - name: Set up Node.js 20 (no npm upgrade)
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache-dependency-path: ''

    # 2. 重建完整的 Expo 49 项目结构（核心文件补齐）
    - name: Rebuild complete Expo 49 project
      run: |
        # 1. 基础 package.json（添加本地 Metro 依赖）
        rm -f package.json package-lock.json
        printf '{"name":"scannerapp","version":"1.0.0","private":true,"dependencies":{"expo":"^49.0.23","react":"18.2.0","react-native":"0.72.6"},"scripts":{"start":"expo start","android":"expo run:android","prebuild":"expo prebuild"},"devDependencies":{"metro-config":"^0.76.8","metro-react-native-babel-preset":"^0.76.8","react-native-cli":"^2.0.1"}}' > package.json
        
        # 2. 核心入口文件
        printf 'import React from "react";\nimport { View, Text, StyleSheet } from "react-native";\n\nconst App = () => {\n  return (\n    <View style={styles.container}>\n      <Text style={styles.text}>ScannerApp Release Build</Text>\n    </View>\n  );\n};\n\nconst styles = StyleSheet.create({\n  container: { flex: 1, justifyContent: "center", alignItems: "center" },\n  text: { fontSize: 18, color: "#333" }\n});\n\nexport default App;' > App.js
        printf 'import { registerRootComponent } from "expo";\nimport App from "./App";\nregisterRootComponent(App);' > index.js
        printf 'const { getDefaultConfig } = require("metro-config");\nmodule.exports = getDefaultConfig(__dirname);' > metro.config.js
        
        # 3. 安装依赖（使用 --unsafe-perm 绕过权限检查，本地安装而非全局）
        npm install --no-audit --no-fund --force --unsafe-perm

    # 3. 本地安装 Expo CLI（避免全局权限问题）
    - name: Install Expo CLI locally (no global)
      run: |
        npm install expo-cli@6.0.8 --no-save --unsafe-perm
        # 配置本地 Expo CLI 路径
        echo "PATH=$(pwd)/node_modules/.bin:$PATH" >> $GITHUB_ENV

    # 4. 生成 Expo 49 配置 + 预构建
    - name: Generate app.json + prebuild
      run: |
        rm -f app.json
        printf '{"expo":{"name":"ScannerApp","slug":"ScannerApp","version":"1.0.0","platforms":["android"],"android":{"package":"com.scannerapp","compileSdkVersion":33,"targetSdkVersion":33,"minSdkVersion":24},"entryPoint":"./index.js"}}' > app.json
        # 使用本地 Expo CLI
        npx expo prebuild --platform android --clean

    # 5. 安装 Gradle 7.5（使用 sudo 解决权限问题）
    - name: Install Gradle 7.5 with sudo
      run: |
        sudo wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -P /tmp
        sudo unzip -q /tmp/gradle-7.5-bin.zip -d /opt
        sudo ln -s /opt/gradle-7.5/bin/gradle /usr/local/bin/gradle
        gradle --version

    # 6. 安装 JDK 11
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # 7. 配置 Release 构建（sudo 兜底权限）
    - name: Configure Release build
      run: |
        cd android/app
        # 生成签名配置
        echo "android {" > release-signing.gradle
        echo "    signingConfigs {" >> release-signing.gradle
        echo "        release {" >> release-signing.gradle
        echo "            storeFile file('debug.keystore')" >> release-signing.gradle
        echo "            storePassword 'android'" >> release-signing.gradle
        echo "            keyAlias 'androiddebugkey'" >> release-signing.gradle
        echo "            keyPassword 'android'" >> release-signing.gradle
        echo "            storeType 'jks'" >> release-signing.gradle
        echo "        }" >> release-signing.gradle
        echo "    }" >> release-signing.gradle
        echo "    buildTypes {" >> release-signing.gradle
        echo "        release {" >> release-signing.gradle
        echo "            signingConfig signingConfigs.release" >> release-signing.gradle
        echo "            minifyEnabled false" >> release-signing.gradle
        echo "            shrinkResources false" >> release-signing.gradle
        echo "        }" >> release-signing.gradle
        echo "    }" >> release-signing.gradle
        echo "}" >> release-signing.gradle
        
        # 导入配置
        echo '' >> build.gradle
        echo 'apply from: "release-signing.gradle"' >> build.gradle

    # 8. 预打包 JS + 编译 APK（sudo 解决 Gradle 权限问题）
    - name: Pre-build JS bundle + Build Release APK
      run: |
        # 手动打包JS（本地 react-native CLI）
        npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res/
        # 编译APK（sudo 兜底权限）
        cd android
        sudo gradle assembleRelease --no-parallel --no-daemon --console=plain
      env:
        ORG_GRADLE_PROJECT_compositeBuild: false
        ORG_GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx8g -Dfile.encoding=UTF-8"

    # 9. 修复 APK 权限 + 上传
    - name: Fix APK permissions + Upload
      run: |
        # 修复 sudo 生成的 APK 权限
        sudo chmod 755 android/app/build/outputs/apk/release/*.apk
        # 上传产物
        mkdir -p ./release-apk
        cp android/app/build/outputs/apk/release/*.apk ./release-apk/
      if: success()

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: scannerapp-release-apk
        path: ./release-apk/*.apk
