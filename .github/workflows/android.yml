name: Android Release Build
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk
  NODE_OPTIONS: --max_old_space_size=4096
  EXPO_NO_DOCTOR: true
  CI: 1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 Node.js
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache-dependency-path: ''

    # 2. 重建 package.json（Expo 49 稳定版）
    - name: Rebuild package.json (Expo 49)
      run: |
        rm -f package.json package-lock.json
        printf '{"name":"scannerapp","version":"1.0.0","private":true,"dependencies":{"expo":"^49.0.23","react":"18.2.0","react-native":"0.72.6"},"scripts":{"prebuild":"expo prebuild","android":"expo run:android"}}' > package.json
        npm install --no-audit --no-fund --force

    # 3. 安装 Expo CLI 6.0.8
    - name: Install Expo CLI 6.0.8
      run: npm install -g expo-cli@6.0.8

    # 4. 生成 Expo 49 配置
    - name: Generate app.json (Expo 49)
      run: |
        rm -f app.json
        printf '{"expo":{"name":"ScannerApp","slug":"ScannerApp","version":"1.0.0","platforms":["android"],"android":{"package":"com.scannerapp","compileSdkVersion":33,"targetSdkVersion":33,"minSdkVersion":24,"buildType":"app-bundle"}}}' > app.json
        npx expo prebuild --platform android --clean

    # 5. 安装 Gradle 7.5
    - name: Install Gradle 7.5 globally
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -P /tmp
        unzip -q /tmp/gradle-7.5-bin.zip -d /opt
        ln -s /opt/gradle-7.5/bin/gradle /usr/local/bin/gradle
        gradle --version

    # 6. 安装 JDK 11
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # 7. 创建调试签名密钥（正式版必需）
    - name: Create debug keystore for release build
      run: |
        cd android/app
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    # 8. 配置 Release 构建（核心修复：用 echo 逐行写入，避开 YAML 冲突）
    - name: Configure Release build
      run: |
        cd android
        
        # 逐行写入 Release 签名配置（无 EOF 冲突）
        echo '' >> app/build.gradle
        echo 'android {' >> app/build.gradle
        echo '    signingConfigs {' >> app/build.gradle
        echo '        release {' >> app/build.gradle
        echo '            storeFile file(''debug.keystore'')' >> app/build.gradle
        echo '            storePassword ''android''' >> app/build.gradle
        echo '            keyAlias ''androiddebugkey''' >> app/build.gradle
        echo '            keyPassword ''android''' >> app/build.gradle
        echo '        }' >> app/build.gradle
        echo '    }' >> app/build.gradle
        echo '    buildTypes {' >> app/build.gradle
        echo '        release {' >> app/build.gradle
        echo '            signingConfig signingConfigs.release' >> app/build.gradle
        echo '            minifyEnabled true' >> app/build.gradle
        echo '            shrinkResources true' >> app/build.gradle
        echo '            proguardFiles getDefaultProguardFile(''proguard-android-optimize.txt''), ''proguard-rules.pro''' >> app/build.gradle
        echo '        }' >> app/build.gradle
        echo '    }' >> app/build.gradle
        echo '}' >> app/build.gradle
        
        # 创建 ProGuard 混淆规则
        echo '# React Native 基础混淆规则' > app/proguard-rules.pro
        echo '-keep class com.facebook.react.** { *; }' >> app/proguard-rules.pro
        echo '-keep class expo.modules.** { *; }' >> app/proguard-rules.pro
        echo '-keep class com.scannerapp.** { *; }' >> app/proguard-rules.pro
        echo '-dontwarn com.facebook.react.**' >> app/proguard-rules.pro
        echo '-dontwarn expo.modules.**' >> app/proguard-rules.pro

    # 9. 编译正式版 Release APK
    - name: Build Android Release APK
      run: gradle assembleRelease --no-parallel --info
      working-directory: ./android
      env:
        ORG_GRADLE_PROJECT_compositeBuild: false

    # 10. 上传正式版 APK
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: scannerapp-release-apk
        path: |
          android/app/build/outputs/apk/release/*.apk
          android/app/build/outputs/apk/release/*.md5
