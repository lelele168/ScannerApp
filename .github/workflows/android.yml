name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk
  NODE_OPTIONS: --max_old_space_size=4096
  EXPO_NO_DOCTOR: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 Node.js（关闭缓存）
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache-dependency-path: ''

    # 2. 彻底修复 package.json，删除报错依赖 + 重建核心依赖
    - name: Fix package.json and install core dependencies
      run: |
        # 备份原 package.json（可选）
        if [ -f package.json ]; then
          cp package.json package.json.bak
          
          # 核心：删除 package.json 中所有 @react-native-google-ml-kit 相关依赖
          jq 'del(.dependencies["@react-native-google-ml-kit/text-recognition"])' package.json > temp.json
          mv temp.json package.json
          
          # 额外：删除所有 ML Kit 相关依赖（防止遗漏）
          jq 'del(.dependencies[] | select(contains("ml-kit")))' package.json > temp.json
          mv temp.json package.json
        else
          # 无 package.json 则新建（YAML 语法修复：用 echo 逐行写入，避免 EOF 冲突）
          echo '{' > package.json
          echo '  "name": "scannerapp",' >> package.json
          echo '  "version": "1.0.0",' >> package.json
          echo '  "dependencies": {' >> package.json
          echo '    "expo": "^50.0.0",' >> package.json
          echo '    "react": "18.2.0",' >> package.json
          echo '    "react-native": "0.73.6"' >> package.json
          echo '  },' >> package.json
          echo '  "scripts": {' >> package.json
          echo '    "prebuild": "expo prebuild"' >> package.json
          echo '  }' >> package.json
          echo '}' >> package.json
        fi
        
        # 安装核心依赖（此时已无报错的 ML Kit 依赖）
        npm install --no-audit --no-fund
        
        # 验证依赖：确认无 ML Kit 相关包
        echo "=== 已安装的依赖 ==="
        npm list | grep -v "ml-kit"

    # 3. 安装 Expo CLI
    - name: Install Expo CLI
      run: npm install -g expo-cli

    # 4. 生成 Expo 原生配置（忽略插件错误）
    - name: Generate Expo Android native code
      run: |
        # 清理 app.json 中的 ML Kit 插件配置
        if [ -f app.json ]; then
          jq 'del(.expo.plugins[] | select(contains("ml-kit")))' app.json > temp.json
          mv temp.json app.json
        fi
        
        # 生成原生代码
        npx expo prebuild --platform android --clean

    # 5. 安装系统级 Gradle 7.5
    - name: Install Gradle 7.5 globally
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -P /tmp
        unzip -q /tmp/gradle-7.5-bin.zip -d /opt
        ln -s /opt/gradle-7.5/bin/gradle /usr/local/bin/gradle
        gradle --version

    # 6. 安装 JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 7. 构建 Debug APK
    - name: Build Android Debug APK
      run: gradle assembleDebug --stacktrace --info --no-parallel
      working-directory: ./android
      env:
        ORG_GRADLE_PROJECT_compositeBuild: false

    # 8. 上传产物
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
