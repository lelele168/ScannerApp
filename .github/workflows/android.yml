name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk
  NODE_OPTIONS: --max_old_space_size=4096
  EXPO_NO_DOCTOR: true
  CI: 1  # 替代废弃的 --non-interactive 参数

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 Node.js（关闭缓存）
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache-dependency-path: ''

    # 2. 重建 package.json（核心修复：用 echo 逐行写，规避 YAML 冲突）
    - name: Rebuild package.json with only core dependencies
      run: |
        rm -f package.json package-lock.json
        # 用 echo 逐行生成 JSON，无 YAML 语法冲突
        echo '{' > package.json
        echo '  "name": "scannerapp",' >> package.json
        echo '  "version": "1.0.0",' >> package.json
        echo '  "private": true,' >> package.json
        echo '  "dependencies": {' >> package.json
        echo '    "expo": "^50.0.17",' >> package.json
        echo '    "react": "18.2.0",' >> package.json
        echo '    "react-native": "0.73.6"' >> package.json
        echo '  },' >> package.json
        echo '  "scripts": {' >> package.json
        echo '    "prebuild": "expo prebuild",' >> package.json
        echo '    "android": "expo run:android"' >> package.json
        echo '  }' >> package.json
        echo '}' >> package.json
        
        npm install --no-audit --no-fund --force
        echo "=== 已安装核心依赖 ==="
        npm list expo react react-native

    # 3. 安装稳定版 Expo CLI
    - name: Install Expo CLI
      run: npm install -g expo-cli@6.3.10

    # 4. 生成合法的 app.json + Expo 原生代码
    - name: Generate valid app.json and Expo native code
      run: |
        rm -f app.json
        # 同样用 echo 逐行生成 app.json，确保 JSON 语法正确
        echo '{' > app.json
        echo '  "expo": {' >> app.json
        echo '    "name": "ScannerApp",' >> app.json
        echo '    "slug": "ScannerApp",' >> app.json
        echo '    "version": "1.0.0",' >> app.json
        echo '    "platforms": ["android"],' >> app.json
        echo '    "android": {' >> app.json
        echo '      "package": "com.scannerapp",' >> app.json
        echo '      "compileSdkVersion": 33,' >> app.json
        echo '      "targetSdkVersion": 33,' >> app.json
        echo '      "minSdkVersion": 24' >> app.json
        echo '    }' >> app.json
        echo '  }' >> app.json
        
        # 验证 JSON 语法
        npx jsonlint app.json || echo "JSON 语法检查工具未安装，跳过验证"
        # 生成原生代码（CI=1 已在 env 中配置）
        npx expo prebuild --platform android --clean

    # 5. 安装系统级 Gradle 7.5
    - name: Install Gradle 7.5 globally
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -P /tmp
        unzip -q /tmp/gradle-7.5-bin.zip -d /opt
        ln -s /opt/gradle-7.5/bin/gradle /usr/local/bin/gradle
        gradle --version

    # 6. 安装 JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 7. 构建 Debug APK
    - name: Build Android Debug APK
      run: gradle assembleDebug --stacktrace --info --no-parallel
      working-directory: ./android
      env:
        ORG_GRADLE_PROJECT_compositeBuild: false

    # 8. 上传产物
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
