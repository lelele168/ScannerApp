name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk
  NODE_OPTIONS: --max_old_space_size=4096
  EXPO_NO_DOCTOR: true
  CI: 1  # 替代 --non-interactive，适配最新 Expo CLI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 Node.js（关闭缓存）
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache-dependency-path: ''

    # 2. 完全重建 package.json（只保留核心依赖）
    - name: Rebuild package.json with only core dependencies
      run: |
        # 彻底删除原有依赖文件
        rm -f package.json package-lock.json
        
        # 新建语法正确的 package.json（无多余空行/符号）
        cat > package.json << 'EOF'
{
  "name": "scannerapp",
  "version": "1.0.0",
  "private": true,
  "dependencies": {
    "expo": "^50.0.17",
    "react": "18.2.0",
    "react-native": "0.73.6"
  },
  "scripts": {
    "prebuild": "expo prebuild",
    "android": "expo run:android"
  }
}
EOF
        
        # 安装核心依赖
        npm install --no-audit --no-fund --force
        
        # 验证依赖
        echo "=== 已安装核心依赖 ==="
        npm list expo react react-native

    # 3. 安装稳定版 Expo CLI
    - name: Install Expo CLI
      run: npm install -g expo-cli@6.3.10

    # 4. 生成语法正确的 app.json + Expo 原生代码
    - name: Generate valid app.json and Expo native code
      run: |
        # 删除原有 app.json
        rm -f app.json
        
        # 新建 JSON 语法100%正确的 app.json（无空行/语法错误）
        cat > app.json << 'EOF'
{
  "expo": {
    "name": "ScannerApp",
    "slug": "ScannerApp",
    "version": "1.0.0",
    "platforms": ["android"],
    "android": {
      "package": "com.scannerapp",
      "compileSdkVersion": 33,
      "targetSdkVersion": 33,
      "minSdkVersion": 24
    }
  }
}
EOF
        
        # 验证 app.json 语法（关键：提前检查，避免构建报错）
        npx jsonlint app.json
        
        # 生成原生代码（用 CI=1 替代 --non-interactive）
        npx expo prebuild --platform android --clean

    # 5. 安装系统级 Gradle 7.5
    - name: Install Gradle 7.5 globally
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -P /tmp
        unzip -q /tmp/gradle-7.5-bin.zip -d /opt
        ln -s /opt/gradle-7.5/bin/gradle /usr/local/bin/gradle
        gradle --version

    # 6. 安装 JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 7. 构建 Debug APK
    - name: Build Android Debug APK
      run: gradle assembleDebug --stacktrace --info --no-parallel
      working-directory: ./android
      env:
        ORG_GRADLE_PROJECT_compositeBuild: false

    # 8. 上传产物
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
