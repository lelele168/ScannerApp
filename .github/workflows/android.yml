name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 核心：彻底重建 Gradle Wrapper 目录（解决 jar 包缺失）
    - name: Fully rebuild Gradle Wrapper (fix GradleWrapperMain error)
      run: |
        cd android
        
        # 1. 删除损坏/缺失的 wrapper 目录
        rm -rf gradle/wrapper
        
        # 2. 重新创建 wrapper 目录
        mkdir -p gradle/wrapper
        
        # 3. 下载官方 Gradle 7.5 Wrapper jar 包（直接替换缺失的文件）
        curl -o gradle/wrapper/gradle-wrapper.jar \
          https://services.gradle.org/distributions/gradle-7.5-wrapper.jar
        
        # 4. 生成正确的 gradle-wrapper.properties 配置文件
        cat > gradle/wrapper/gradle-wrapper.properties << EOF
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
        
        # 5. 修复 gradlew 权限和换行符（保留之前的修复）
        chmod 777 gradlew
        sed -i 's/\r$//' gradlew
        
        # 6. 验证 wrapper 文件是否存在
        echo "=== Wrapper 文件列表 ==="
        ls -la gradle/wrapper/

    - name: Build Android Debug APK
      run: bash gradlew assembleDebug --stacktrace --info
      working-directory: ./android
      continue-on-error: false

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
