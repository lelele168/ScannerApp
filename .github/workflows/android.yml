name: Android CI
# 修复 Node.js 20 弃用警告 + 解决 gradlew 路径问题
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用 Node.js 24
  ANDROID_HOME: /usr/local/android-sdk  # 确保 Android 环境变量

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # 基础权限，避免权限不足

    steps:
    # 1. 检出代码（确保完整拉取 android 目录）
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 拉取完整仓库，避免 android 目录缺失

    # 2. 安装 JDK 17（Expo/新版 Gradle 必须用 17，而非 11）
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. 关键：检查 android 目录结构 + 重建 Gradle Wrapper（解决 exit 127）
    - name: Validate Android directory and fix Gradle Wrapper
      run: |
        # 打印目录结构，确认 gradlew 存在
        echo "=== Android 目录文件列表 ==="
        ls -la android/ || { echo "android 目录不存在！"; exit 1; }
        
        # 进入 android 目录，确保 gradlew 有执行权限
        cd android
        chmod +x gradlew || { echo "gradlew 文件不存在！"; exit 1; }
        
        # 重建 Gradle Wrapper（解决 ClassNotFoundException 问题）
        ./gradlew wrapper --gradle-version 7.5 --distribution-type all

    # 4. 执行 Gradle 构建（只打调试包，减少配置依赖）
    - name: Build Android Debug APK
      run: ./gradlew assembleDebug --stacktrace --info
      working-directory: ./android  # 强制在 android 目录执行
      continue-on-error: false  # 报错时停止，方便排查

    # 5. 上传打包产物（可选，方便下载 APK）
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()  # 只有构建成功才上传
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
