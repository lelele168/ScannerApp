name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk
  NODE_OPTIONS: --max_old_space_size=4096
  EXPO_NO_DOCTOR: true
  CI: 1

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 Node.js
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache-dependency-path: ''

    # 2. 重建 package.json（无空行 JSON）
    - name: Rebuild package.json
      run: |
        rm -f package.json package-lock.json
        # 使用 printf 生成无空行的 JSON
        printf '{\n  "name": "scannerapp",\n  "version": "1.0.0",\n  "private": true,\n  "dependencies": {\n    "expo": "^50.0.17",\n    "react": "18.2.0",\n    "react-native": "0.73.6"\n  },\n  "scripts": {\n    "prebuild": "expo prebuild",\n    "android": "expo run:android"\n  }\n}' > package.json
        
        npm install --no-audit --no-fund --force

    # 3. 安装 Expo CLI
    - name: Install Expo CLI
      run: npm install -g expo-cli@6.3.10

    # 4. 生成无空行的 app.json + 原生代码（核心修复）
    - name: Generate app.json and Expo code
      run: |
        rm -f app.json
        # 关键：printf 生成纯 JSON 字符串，无任何空行/多余字符
        printf '{"expo":{"name":"ScannerApp","slug":"ScannerApp","version":"1.0.0","platforms":["android"],"android":{"package":"com.scannerapp","compileSdkVersion":33,"targetSdkVersion":33,"minSdkVersion":24}}}' > app.json
        
        # 跳过 jsonlint，直接执行 prebuild（避免验证步骤干扰）
        npx expo prebuild --platform android --clean --yes

    # 5. 安装 Gradle 7.5
    - name: Install Gradle 7.5
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -P /tmp
        unzip -q /tmp/gradle-7.5-bin.zip -d /opt
        ln -s /opt/gradle-7.5/bin/gradle /usr/local/bin/gradle

    # 6. 安装 JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 7. 构建 APK
    - name: Build Android Debug APK
      run: gradle assembleDebug --no-parallel
      working-directory: ./android
      env:
        ORG_GRADLE_PROJECT_compositeBuild: false

    # 8. 上传产物
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
