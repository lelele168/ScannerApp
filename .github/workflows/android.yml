name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk
  NODE_OPTIONS: --max_old_space_size=4096
  EXPO_NO_DOCTOR: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 Node.js（关闭缓存）
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache-dependency-path: ''

    # 2. 完全重建 package.json（只保留核心依赖，删除所有第三方依赖）
    - name: Rebuild package.json with only core dependencies
      run: |
        # 彻底删除原 package.json（避免残留有问题的依赖）
        rm -f package.json package-lock.json
        
        # 新建纯净的 package.json，仅包含 Expo 核心依赖
        echo '{' > package.json
        echo '  "name": "scannerapp",' >> package.json
        echo '  "version": "1.0.0",' >> package.json
        echo '  "private": true,' >> package.json
        echo '  "dependencies": {' >> package.json
        echo '    "expo": "^50.0.17",' >> package.json
        echo '    "react": "18.2.0",' >> package.json
        echo '    "react-native": "0.73.6"' >> package.json
        echo '  },' >> package.json
        echo '  "scripts": {' >> package.json
        echo '    "prebuild": "expo prebuild",' >> package.json
        echo '    "android": "expo run:android"' >> package.json
        echo '  }' >> package.json
        echo '}' >> package.json
        
        # 安装核心依赖（仅 Expo/React/React Native，无任何第三方包）
        npm install --no-audit --no-fund --force
        
        # 验证：只显示核心依赖
        echo "=== 已安装的核心依赖 ==="
        npm list expo react react-native

    # 3. 安装 Expo CLI
    - name: Install Expo CLI
      run: npm install -g expo-cli@6.3.10  # 指定稳定版本，避免最新版兼容问题

    # 4. 生成纯净的 Expo Android 原生代码
    - name: Generate clean Expo Android native code
      run: |
        # 清理/重建 app.json（只保留核心配置，删除所有第三方插件）
        rm -f app.json
        echo '{' > app.json
        echo '  "expo": {' >> app.json
        echo '    "name": "ScannerApp",' >> app.json
        echo '    "slug": "ScannerApp",' >> app.json
        echo '    "version": "1.0.0",' >> app.json
        echo '    "platforms": ["android"],' >> app.json
        echo '    "android": {' >> app.json
        echo '      "package": "com.scannerapp",' >> app.json
        echo '      "compileSdkVersion": 33,' >> app.json
        echo '      "targetSdkVersion": 33,' >> app.json
        echo '      "minSdkVersion": 24' >> app.json
        echo '    }' >> app.json
        echo '  }' >> app.json
        
        # 生成原生代码（纯净版，无第三方插件）
        npx expo prebuild --platform android --clean --non-interactive

    # 5. 安装系统级 Gradle 7.5
    - name: Install Gradle 7.5 globally
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -P /tmp
        unzip -q /tmp/gradle-7.5-bin.zip -d /opt
        ln -s /opt/gradle-7.5/bin/gradle /usr/local/bin/gradle
        gradle --version

    # 6. 安装 JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 7. 构建纯净版 Debug APK
    - name: Build Clean Android Debug APK
      run: gradle assembleDebug --stacktrace --info --no-parallel
      working-directory: ./android
      env:
        ORG_GRADLE_PROJECT_compositeBuild: false

    # 8. 上传产物
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
