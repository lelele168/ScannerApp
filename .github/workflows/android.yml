name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装系统级 Gradle 7.5（不依赖本地 wrapper）
    - name: Install Gradle 7.5 globally
      run: |
        # 下载并解压 Gradle 7.5
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -P /tmp
        unzip -q /tmp/gradle-7.5-bin.zip -d /opt
        ln -s /opt/gradle-7.5/bin/gradle /usr/local/bin/gradle
        
        # 验证 Gradle 安装
        gradle --version

    # 2. 安装 JDK 17（必须和 Gradle 7.5 匹配）
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. 清理 android 目录（移除损坏的 wrapper）
    - name: Clean Android directory
      run: |
        cd android
        # 删除本地 wrapper 避免干扰
        rm -rf gradle/wrapper gradlew gradlew.bat
        # 确认目录结构
        ls -la

    # 4. 直接用系统 Gradle 构建（核心：不依赖本地 gradlew）
    - name: Build Android Debug APK with system Gradle
      run: gradle assembleDebug --stacktrace --info
      working-directory: ./android
      continue-on-error: false

    # 5. 上传产物
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
