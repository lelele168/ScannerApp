name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'  # 升级到 JDK 17，适配新版 Gradle/Expo
        distribution: 'temurin'
        cache: gradle

    - name: Check android directory exists
      run: ls -la android/  # 先确认目录结构，方便排查

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: ./android  # 切到 android 目录

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace  # --stacktrace 打印详细错误
      working-directory: ./android

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: android/app/build/outputs/apk/debug/
