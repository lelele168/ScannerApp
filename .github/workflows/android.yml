name: Android CI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/android-sdk
  NODE_OPTIONS: --max_old_space_size=4096
  EXPO_NO_DOCTOR: true
  CI: 1  # 非交互模式核心配置，替代--yes

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 Node.js（关闭缓存）
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache-dependency-path: ''

    # 2. 重建 package.json（单行紧凑 JSON，无空行）
    - name: Rebuild package.json with core dependencies
      run: |
        rm -f package.json package-lock.json
        # printf 生成无空行的单行 JSON
        printf '{"name":"scannerapp","version":"1.0.0","private":true,"dependencies":{"expo":"^50.0.17","react":"18.2.0","react-native":"0.73.6"},"scripts":{"prebuild":"expo prebuild","android":"expo run:android"}}' > package.json
        
        # 安装核心依赖，强制跳过冲突
        npm install --no-audit --no-fund --force

    # 3. 安装稳定版 Expo CLI
    - name: Install Expo CLI
      run: npm install -g expo-cli@6.3.10

    # 4. 生成无空行的 app.json + Expo 原生代码（移除--yes参数）
    - name: Generate valid app.json and Expo native code
      run: |
        rm -f app.json
        # 单行紧凑 JSON，无任何空行/解析错误
        printf '{"expo":{"name":"ScannerApp","slug":"ScannerApp","version":"1.0.0","platforms":["android"],"android":{"package":"com.scannerapp","compileSdkVersion":33,"targetSdkVersion":33,"minSdkVersion":24}}}' > app.json
        
        # 仅保留核心参数，CI=1 已确保非交互模式
        npx expo prebuild --platform android --clean

    # 5. 安装系统级 Gradle 7.5
    - name: Install Gradle 7.5 globally
      run: |
        wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -P /tmp
        unzip -q /tmp/gradle-7.5-bin.zip -d /opt
        ln -s /opt/gradle-7.5/bin/gradle /usr/local/bin/gradle
        gradle --version

    # 6. 安装 JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 7. 构建 Android Debug APK（精简参数，减少冲突）
    - name: Build Android Debug APK
      run: gradle assembleDebug --no-parallel
      working-directory: ./android
      env:
        ORG_GRADLE_PROJECT_compositeBuild: false

    # 8. 上传产物（构建成功则上传）
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
